<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>N FREIGHT Cargo Tracking</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <img src="logo.png" class="logo" alt="N FREIGHT">

  <div id="result"></div>

<script src="script.js"></script>
</body>
</html>
